name: Update Cloudflare Worker Secret

on:
  push:
    paths:
      - permissions.json

jobs:
  update-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert permissions.json to single-line JSON
        run: |
          PERMS=$(jq -c . permissions.json)
          echo "PERMS=$PERMS" >> $GITHUB_ENV

      - name: Update Cloudflare Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: 370ea46fed733e6f216445738493f397
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/auth/secrets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"PERMISSIONS_JSON\",
              \"text\": \"$PERMS\",
              \"type\": \"secret_text\"
            }"
