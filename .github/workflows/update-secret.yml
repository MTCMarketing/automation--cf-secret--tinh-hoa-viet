name: Update Cloudflare Worker Secret

on:
  push:
    paths:
      - permissions.json

jobs:
  update-secret:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify permissions.json
        run: |
          echo "permissions.json contents:"
          cat permissions.json
          echo ""
          echo "Single line version:"
          jq -c . permissions.json

      - name: Debug token presence
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is empty"
            exit 1
          else
            echo "Token detected"
            echo "Token length: ${#CLOUDFLARE_API_TOKEN}"
            echo "Token prefix: ${CLOUDFLARE_API_TOKEN:0:6}"
          fi

      - name: Convert permissions.json
        run: |
          PERMS=$(jq -c . permissions.json)
          echo "PERMS=$PERMS" >> $GITHUB_ENV

      - name: Update Cloudflare Worker secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: "370ea46fed733e6f216445738493f397"
          WORKER_NAME: "auth"
        run: |
          echo "Using account: $ACCOUNT_ID"
          echo "Worker: $WORKER_NAME"

          echo "Permissions payload:"
          echo "$PERMS"

          BODY=$(jq -n \
            --arg perms "$PERMS" \
            '{
              name: "PERMISSIONS_JSON",
              text: $perms,
              type: "secret_text"
            }')

          echo "Request body:"
          echo "$BODY"

          echo "Calling Cloudflare API..."

          curl -v -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}/secrets" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
